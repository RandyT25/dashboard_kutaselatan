name: Update Dashboard Data

on:
  push:
    branches: [main]
    paths:
      - "*.xlsx"
      - "parse_data.py"

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate data.js from xlsx
        run: python parse_data.py

      - name: Commit and push data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet && echo "No changes to data.js" || \
            git commit -m "auto: update data.js from latest xlsx [skip ci]" && git push
